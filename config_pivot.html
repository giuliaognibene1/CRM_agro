<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Macchina Pivot</title>

<link rel="stylesheet" href="css/style.css">

<!-- libreria PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- tuo javascript separato -->
<script defer src="js/config_pivot.js"></script>
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-box">
          <img src="logo.png" alt="Logo azienda">
        </div>

        <ul>
            <li onclick="location.href='index.html'">📊 Dashboard</li>
            <li onclick="location.href='clienti.html'">👥 Clienti</li>
            <li onclick="location.href='ticket.html'">🎫 Ticket</li>
            <li onclick="location.href='calendario.html'">📅 Calendario</li>
            <li class="active" onclick="location.href='configuratore.html'">⚙️ Configuratori</li>
            <li onclick="location.href='prelievo.html'">📦 Prelievo materiali</li>
        </ul>
    </div>

    <!-- CONTENUTO -->
    <div class="main">

        <h1>Configuratore pivot</h1>

        <!-- CLIENTE -->
        <h3>NOME CLIENTE: *</h3>
        <input type="text" id="cliente" placeholder="Inserisci nome cliente">

        <br><br>

        <!-- CENTRO PIVOT -->
        <h3>CENTRO PIVOT</h3>

        <label>Pivot point:</label>
        <select data-cat="Piramide" onchange="aggiorna()">
            <option value="">-- Seleziona --</option>
            <option value="piramide_alto_profilo">Piramide alto profilo</option>
            <option value="carro_4ruote_standard">Carro 4 ruote profilo standard</option>
        </select>

        <br>

        <!-- CAMPATE -->
        <h3>CAMPATE</h3>

        <label>Campata iniziale:</label>
        <select id="campata_iniziale" onchange="aggiorna()">
            <option value="">-- Nessuna --</option>
            <option value="campata44_i">44</option>
            <option value="campata50_i">50</option>
            <option value="campata56_i">56</option>
            <option value="campata62_i">62</option>
        </select>

        <br>

        <label>Campate intermedie:</label>
        <div id="listaCampate"></div>

        <button type="button" onclick="aggiungiCampata()">
            + Aggiungi campata
        </button>

        <br>

        <label>Campata finale:</label>
        <select id="campata_finale" onchange="aggiorna()">
            <option value="">-- Nessuna --</option>
            <option value="campata44_f">44</option>
            <option value="campata50_f">50</option>
            <option value="campata56_f">56</option>
            <option value="campata62_f">62</option>
        </select>

        <!-- SBRACCI -->
        <h3>SBRACCI</h3>

        <label>Sbraccio:</label>
        <select data-cat="Sbraccio" onchange="aggiorna()">
            <option value="">-- Seleziona --</option>
            <option value="sbraccio10">10m</option>
            <option value="sbraccio12">12m</option>
            <option value="sbraccio14">14m</option>
            <option value="sbraccio16">16m</option>
            <option value="sbraccio18">18m</option>
            <option value="sbraccio20">20m</option>
            <option value="sbraccio24">24m</option>
            <option value="sbraccio26">26m</option>
        </select>

        <!-- BARRIERA -->
        <h3>BARRIERA</h3>

        <label>Barriera:</label>
        <select data-cat="Barriera" onchange="aggiorna()">
            <option value="">-- Seleziona --</option>
            <option value="barriera_si">SI</option>
            <option value="barriera_no">NO</option>
        </select>

        <!-- RISULTATI -->
        <h2>Materiali per categoria</h2>
        <div id="perCategoria"></div>

        <h2>Totale materiali</h2>
        <ul id="totale"></ul>

        <button type="button" onclick="generaPDF()">
            Esporta PDF
        </button>

    </div>
</div>

</body>
</html>
